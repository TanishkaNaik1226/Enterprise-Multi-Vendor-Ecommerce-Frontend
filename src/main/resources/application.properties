spring.application.name=shopstack-backend
server.port=8080

# Postgres — override via env vars in any real environment, do not commit real credentials.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/shopstack}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:2411}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=false

# Google OAuth2 — real values must come from env vars, never committed. Spring Security validates
# this at startup and rejects an empty client-id, so keep a non-empty placeholder default even
# though Google login won't actually work until real values are set.
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:not-configured-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:not-configured-client-secret}
spring.security.oauth2.client.registration.google.scope=email,profile

# JWT — JwtService fails fast at startup if this is under 256 bits (32 chars).
# Set JWT_SECRET_KEY in production; this fallback is for local dev only.
application.security.jwt.secret-key=${JWT_SECRET_KEY:ReplaceThisWithA256BitSecretKeyForDevelopmentOnly123456789}
application.security.jwt.expiration=86400000

# Default admin bootstrap account — see AdminBootstrapSeeder. Change in production via env vars.
shopstack.admin.default-email=${ADMIN_EMAIL:admin@shopstack.com}
shopstack.admin.default-password=${ADMIN_PASSWORD:Admin@123}

spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
